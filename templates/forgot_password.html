{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block extra_css %}
<style>
.auth-page{min-height:70vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:linear-gradient(135deg,#FFF8F0 0%,#F5F5F5 100%)}
.auth-box{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:40px 44px;width:100%;max-width:420px;box-shadow:var(--shadow-lg)}
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:48px;margin-bottom:12px">🔐</div>
      <h1 style="font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--navy);margin-bottom:6px">Forgot Password?</h1>
      <p style="font-size:14px;color:var(--text-muted)">Enter your email and we'll send you an OTP to reset your password</p>
    </div>
    <div id="step1">
      <div class="form-group">
        <label class="form-label">Registered Email</label>
        <input class="form-input" type="email" id="resetEmail" placeholder="you@example.com">
      </div>
      <button class="btn btn-primary btn-full btn-lg" onclick="sendOtp()">Send OTP →</button>
    </div>
    <div id="step2" style="display:none">
      <div class="form-group">
        <label class="form-label">Enter OTP (sent to your email)</label>
        <input class="form-input" type="text" id="otpInput" placeholder="6-digit OTP" maxlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input class="form-input" type="password" placeholder="Min 8 characters">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input class="form-input" type="password" placeholder="Re-enter new password">
      </div>
      <button class="btn btn-primary btn-full btn-lg" onclick="resetPw()">Reset Password →</button>
    </div>
    <div style="text-align:center;margin-top:20px">
      <a href="/login" style="font-size:14px;color:var(--teal);font-weight:600">← Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function sendOtp() {
  const email = document.getElementById('resetEmail').value;
  if (!email) { showToast('Please enter your email', 'error'); return; }
  showToast('OTP sent to ' + email + ' ✅');
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
}
function resetPw() {
  showToast('Password reset successful! Redirecting…');
  setTimeout(() => window.location = '/login', 1800);
}
</script>
{% endblock %}
